<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Financeira - Assistente Jurídico</title>
    <style>
        :root { --primary: #1a5f3d; --secondary: #2d8a5b; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 500px; text-align: center; border-top: 6px solid var(--primary); }
        h1 { color: var(--primary); font-size: 1.75rem; margin-bottom: 1.5rem; }
        p { color: #475569; line-height: 1.6; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2.5rem; text-align: left; font-size: 0.95rem; }
        .item { padding: 1rem; background: #f1f5f9; border-radius: 0.75rem; border-left: 4px solid var(--secondary); display: flex; align-items: center; gap: 0.5rem; }
        .btn { display: block; background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; transition: all 0.2s; }
        .btn:hover { background: var(--secondary); transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 Auditoria Financeira</h1>
        <p>A ferramenta de análise de valores está configurada para cálculos do <b>TJMG</b> e <b>Banco Central</b>.</p>
        <div class="grid">
            <div class="item">✅ Juros de Mora</div>
            <div class="item">✅ Correção TJMG</div>
            <div class="item">✅ Expurgos</div>
            <div class="item">✅ Honorários</div>
        </div>
        <p>Utilize este módulo para validar os valores de suas petições com precisão jurídica.</p>
        <a href="/" class="btn">Voltar ao Assistente</a>
    </div>
</body>
</html>
