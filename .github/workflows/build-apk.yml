name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android SDK
        run: |
          yes | sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools" 2>/dev/null || true

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Sincronizar assets para Android
        run: npx cap copy android

      - name: Permissao no gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Resumo
        run: |
          echo "## ✅ APK Gerado!" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o .apk na aba **Artifacts** acima." >> $GITHUB_STEP_SUMMARY
